    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback, useMemo } = React;

        // =====================================================================
        // 1. ROBUST AUDIO & TTS ENGINE (Error Proof)
        // =====================================================================
        
        // Singleton pattern for AudioContext to prevent "AudioContext limit" errors
        class AudioEngine {
            constructor() {
                this.ctx = null;
                this.enabled = true;
                this.volume = 0.3;
            }
            init() {
                if (!this.ctx) {
                    try {
                        window.AudioContext = window.AudioContext || window.webkitAudioContext;
                        this.ctx = new AudioContext();
                    } catch (e) {
                        console.warn("AudioContext not supported", e);
                        this.enabled = false;
                    }
                }
            }
            playTone(type) {
                if (!this.enabled) return;
                this.init();
                if (this.ctx.state === 'suspended') this.ctx.resume();
                
                try {
                    const osc = this.ctx.createOscillator();
                    const gainNode = this.ctx.createGain();
                    osc.connect(gainNode);
                    gainNode.connect(this.ctx.destination);
                    const now = this.ctx.currentTime;
                    
                    if(type === 'correct') {
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(523.25, now);
                        osc.frequency.exponentialRampToValueAtTime(1046.50, now + 0.1);
                        gainNode.gain.setValueAtTime(this.volume, now);
                        gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                        osc.start(now); osc.stop(now + 0.3);
                    } else if(type === 'wrong') {
                        osc.type = 'sawtooth';
                        osc.frequency.setValueAtTime(150, now);
                        osc.frequency.exponentialRampToValueAtTime(100, now + 0.2);
                        gainNode.gain.setValueAtTime(this.volume, now);
                        gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                        osc.start(now); osc.stop(now + 0.2);
                    } else if(type === 'tick') {
                        osc.type = 'triangle';
                        osc.frequency.setValueAtTime(800, now);
                        gainNode.gain.setValueAtTime(this.volume * 0.3, now);
                        gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
                        osc.start(now); osc.stop(now + 0.05);
                    } else if(type === 'fanfare') {
                        [523.25, 659.25, 783.99, 1046.50].forEach((freq, i) => { 
                            const o = this.ctx.createOscillator(); const g = this.ctx.createGain(); o.type = 'square';
                            o.frequency.setValueAtTime(freq, now + (i*0.1)); 
                            o.connect(g); g.connect(this.ctx.destination);
                            g.gain.setValueAtTime(this.volume * 0.5, now + (i*0.1)); 
                            g.gain.exponentialRampToValueAtTime(0.01, now + 1.5 + (i*0.1));
                            o.start(now + (i*0.1)); o.stop(now + 1.5 + (i*0.1));
                        });
                    }
                } catch (e) { console.error("Audio playback failed", e); }
            }
        }
        const audioEngine = new AudioEngine();

        class TTSEngine {
            constructor() {
                this.synth = window.speechSynthesis;
                this.voices = [];
                this.rate = 0.85; // Default slow rate for learning
                this.volume = 1;
                this.pitch = 1;
                this.loadVoices();
                if (this.synth) {
                    this.synth.onvoiceschanged = () => this.loadVoices();
                }
            }
            loadVoices() {
                if (this.synth) {
                    this.voices = this.synth.getVoices();
                }
            }
            speak(text, onEndCallback = null) {
                if (!this.synth) {
                    console.warn("TTS not supported.");
                    if(onEndCallback) onEndCallback();
                    return;
                }
                
                this.synth.cancel(); // Clear queue
                
                if (!text) return;
                
                try {
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.rate = this.rate;
                    utterance.volume = this.volume;
                    utterance.pitch = this.pitch;
                    
                    // Try to find a good English voice (preferably female for pageant context if available)
                    let voice = this.voices.find(v => v.lang.includes('en-US') && v.name.includes('Female')) || 
                                this.voices.find(v => v.lang.includes('en-US') && v.name.includes('Samantha')) ||
                                this.voices.find(v => v.lang.includes('en-GB') && v.name.includes('Female')) ||
                                this.voices.find(v => v.lang.startsWith('en'));
                    
                    if (voice) utterance.voice = voice;
                    
                    if (onEndCallback) {
                        utterance.onend = onEndCallback;
                        utterance.onerror = onEndCallback;
                    }
                    
                    this.synth.speak(utterance);
                } catch (e) {
                    console.error("TTS Error:", e);
                    if(onEndCallback) onEndCallback();
                }
            }
            stop() {
                if (this.synth) this.synth.cancel();
            }
        }
        const ttsEngine = new TTSEngine();

        // =====================================================================
        // 2. ERROR BOUNDARY (Shields the app from crashing)
        // =====================================================================
        class SafeBoundary extends React.Component {
            constructor(props) { 
                super(props); 
                this.state = { hasError: false, errorInfo: null }; 
            }
            static getDerivedStateFromError(error) { 
                return { hasError: true }; 
            }
            componentDidCatch(error, errorInfo) { 
                console.error("Component Crash Caught:", error, errorInfo);
                this.setState({ errorInfo });
            }
            render() {
                if (this.state.hasError) {
                    return (
                        <div className="glass-panel p-10 rounded-[2rem] w-full max-w-lg mx-auto text-center border-t-8 border-rose-500 shadow-2xl animate-fade-in-up my-10 shrink-0">

                            </div>
                            <h3 className="text-2xl font-extrabold text-gray-800 mb-3">Module Initialization Error</h3>
                            <p className="text-gray-600 mb-8 leading-relaxed">We encountered an unexpected issue while loading this specific activity. The rest of the course is perfectly safe.</p>
                            <div className="flex justify-center gap-4">
                                <button onClick={() => this.setState({ hasError: false })} className="px-6 py-3 bg-gray-800 hover:bg-gray-900 text-white font-bold rounded-xl shadow-lg transition-all active:scale-95">
                                    Try Reloading Module
                                </button>
                            </div>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        const Teleprompter = ({ title, text, speedMultiplier=1 }) => {
            const [isPlaying, setIsPlaying] = useState(false);
            const contentRef = useRef(null);
            
            // Reformat text to show emphasis
            const formattedText = text.replace(/\*\*(.*?)\*\*/g, '<span class="text-rose-400 font-extrabold">$1</span>');

            useEffect(() => {
                let animationFrameId;
                let lastTime = 0;
                // Pixels per second
                const baseSpeed = 40 * speedMultiplier; 

                const scroll = (time) => {
                    if (!lastTime) lastTime = time;
                    const deltaTime = (time - lastTime) / 1000;
                    lastTime = time;

                    if (isPlaying && contentRef.current) {
                        contentRef.current.scrollTop += baseSpeed * deltaTime;
                        
                        // Check if reached bottom
                        if (contentRef.current.scrollTop >= (contentRef.current.scrollHeight - contentRef.current.clientHeight)) {
                            setIsPlaying(false);
                            audioEngine.playTone('fanfare');
                        }
                    }
                    if(isPlaying) {
                        animationFrameId = requestAnimationFrame(scroll);
                    }
                };

                if (isPlaying) {
                    animationFrameId = requestAnimationFrame(scroll);
                }
                
                return () => {
                    cancelAnimationFrame(animationFrameId);
                };
            }, [isPlaying, speedMultiplier]);

            const reset = () => {
                setIsPlaying(false);
                if(contentRef.current) contentRef.current.scrollTop = 0;
            };

            return (
                <div className="bg-gray-900 p-2 rounded-[3rem] w-full max-w-4xl mx-auto shadow-2xl relative shrink-0 overflow-hidden border border-gray-700">

                                        <SlideRenderer content={slide.content} />
                                    </SafeBoundary>
                                </div>
                            </div>
                        </main>

                        {/* Teacher Notes Sidebar Panel */}
                        <aside className={`w-80 md:w-[400px] glass-panel border-l border-white/80 shadow-2xl z-20 transition-transform duration-300 absolute right-0 h-full flex flex-col ${showNotes ? 'translate-x-0' : 'translate-x-full'}`}>
                            <div className="p-8 border-b border-gray-200 flex justify-between items-center bg-white/50 rounded-tr-[2rem]">
                                <h3 className="text-xl font-extrabold text-navy-900 flex items-center gap-3"><Icons.Lightbulb className="text-gold-500"/> Pedagogical Guide</h3>
                                <button onClick={() => setShowNotes(false)} className="text-gray-400 hover:text-gray-800"><Icons.X/></button>
                            </div>
                            <div className="p-8 flex-1 overflow-y-auto">
                                <div className="bg-white/80 p-6 rounded-[2rem] border border-gray-200 shadow-sm relative text-gray-800 leading-relaxed text-base">
                                    <div className="absolute top-0 left-0 w-2 h-full bg-gold-400 rounded-l-[2rem]"></div>
                                    <strong className="block text-gold-600 mb-3 uppercase tracking-widest text-xs">Instructions for Teacher:</strong>
                                    {slide.note}
                                </div>
                            </div>
                        </aside>

                    </div>

                    {/* Footer Navigation Bar */}
                    <footer className="glass-header h-24 px-6 md:px-10 flex justify-between items-center z-40 relative shrink-0">
                        <Button onClick={() => setCurrentSlide(p => Math.max(p - 1, 0))} disabled={currentSlide === 0} variant="secondary" className="px-5 py-3.5"><Icons.ChevronLeft/> <span className="hidden md:inline">Previous Module</span></Button>
                        
                        {/* Pagination Dots (Desktop) */}
                        <div className="hidden lg:flex gap-2">
                            {MASTERCLASS_DATA.map((_, idx) => (
                                <div key={idx} className={`h-3 rounded-full transition-all duration-500 shadow-inner ${idx === currentSlide ? 'w-12 bg-navy-900' : idx <= maxUnlocked ? 'w-3 bg-gray-300 cursor-pointer hover:bg-navy-400' : 'w-3 bg-gray-200 opacity-50'}`} onClick={() => idx <= maxUnlocked && setCurrentSlide(idx)}></div>
                            ))}
                        </div>
                        
                        {/* Mobile Counter */}
                        <div className="lg:hidden text-sm font-bold text-gray-500 uppercase tracking-widest">
                            {currentSlide + 1} / {MASTERCLASS_DATA.length}
                        </div>

                        <Button onClick={() => setCurrentSlide(p => Math.min(p + 1, MASTERCLASS_DATA.length - 1))} disabled={currentSlide === MASTERCLASS_DATA.length - 1} variant="primary" className="px-5 py-3.5 bg-navy-900"><span className="hidden md:inline">Next Module</span> <Icons.ChevronRight/></Button>
                    </footer>
                </div>
            );
        };

        // Initialize React App
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
